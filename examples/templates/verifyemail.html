<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Verified</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f5f5f5;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
      }
      .card {
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 2px 16px rgba(0,0,0,0.08);
        padding: 48px 40px;
        text-align: center;
        max-width: 420px;
        width: 100%;
      }
      .icon {
        font-size: 48px;
        margin-bottom: 20px;
      }
      h1 {
        font-size: 22px;
        font-weight: 600;
        color: #111;
        margin-bottom: 12px;
      }
      .email {
        font-size: 15px;
        color: #555;
        margin-bottom: 8px;
      }
      .email strong {
        color: #111;
      }
      .sub {
        font-size: 12px;
        color: #aaa;
        font-family: monospace;
        margin-bottom: 28px;
        word-break: break-all;
      }
      .note {
        font-size: 13px;
        color: #777;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">✅</div>
      <h1>Email Verified</h1>
      <p class="email">Signed in as <strong>{{.Email}}</strong></p>
      <p class="sub">{{.ID}}</p>
      <p class="note">Your email address has been confirmed. You can close this window.</p>
    </div>
  </body>
</html>
