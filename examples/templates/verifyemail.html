<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Verified</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,.08);
      padding: 3rem 2.5rem;
      text-align: center;
      max-width: 420px;
      width: 100%;
    }
    .icon { font-size: 3rem; margin-bottom: 1.25rem; }
    h1 { font-size: 1.3rem; font-weight: 600; color: #111; margin-bottom: 0.75rem; }
    .email { font-size: 0.95rem; color: #555; margin-bottom: 0.4rem; }
    .email strong { color: #111; }
    .sub { font-size: 0.75rem; color: #aaa; font-family: monospace; margin-bottom: 1.5rem; word-break: break-all; }
    .note { font-size: 0.8rem; color: #777; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">&#10003;</div>
    <h1>Email Verified</h1>
    <p class="email">Signed in as <strong>{{.Email}}</strong></p>
    <p class="sub">{{.ID}}</p>
    <p class="note">Your email address has been confirmed. You can close this window.</p>
  </div>
</body>
</html>
